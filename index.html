<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Values Project</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        /* EFEITO RGB NO TÍTULO */
        .rgb-title {
            font-size: 80px;
            font-weight: 900;
            text-transform: uppercase;
            position: relative;
            text-shadow: 
                3px 0 0 rgba(255,0,0,0.7), 
                -3px 0 0 rgba(0,255,255,0.7);
            animation: rgb-shake 0.5s infinite;
        }

        @keyframes rgb-shake {
            0% { text-shadow: 3px 0 0 rgba(255,0,0,0.7), -3px 0 0 rgba(0,255,255,0.7); }
            25% { text-shadow: -3px 2px 0 rgba(255,0,0,0.7), 3px -2px 0 rgba(0,255,255,0.7); }
            50% { text-shadow: 2px -3px 0 rgba(255,0,0,0.7), -2px 3px 0 rgba(0,255,255,0.7); }
            75% { text-shadow: -2px -2px 0 rgba(255,0,0,0.7), 2px 2px 0 rgba(0,255,255,0.7); }
            100% { text-shadow: 3px 0 0 rgba(255,0,0,0.7), -3px 0 0 rgba(0,255,255,0.7); }
        }

        /* CONTAINER DOS CAMPOS */
        .input-container {
            width: 80%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 40px;
        }

        input, textarea {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 15px;
            color: #fff;
            font-size: 18px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #00fff2;
            box-shadow: 0 0 15px rgba(0, 255, 242, 0.3);
        }

        label {
            font-size: 14px;
            color: #888;
            margin-bottom: -15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        textarea {
            resize: vertical;
            min-height: 150px;
        }
    </style>
</head>
<body>

    <h1 class="rgb-title">Values</h1>

    <div class="input-container">
        <label>Categoria</label>
        <input type="text" placeholder="Digite o título da categoria...">

        <label>Texto</label>
        <textarea placeholder="Desenvolva o conteúdo aqui..."></textarea>
    </div>

</body>
</html>
