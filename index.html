<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Values List</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px;
            margin: 0;
        }

        /* LOGO TOTALMENTE BRANCA E ESTÁTICA */
        .rgb-title {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            text-transform: uppercase;
            color: #ffffff; /* Cor branca sólida */
            margin: 10px 0 20px 0;
            text-align: center;
            letter-spacing: 2px;
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 40px;
        }

        #searchInput {
            width: 100%;
            padding: 15px;
            background: #111;
            border: 2px solid #333;
            border-radius: 8px;
            color: #00fff2;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            text-align: center;
        }

        #searchInput:focus {
            border-color: #00fff2;
            box-shadow: 0 0 15px rgba(0, 255, 242, 0.2);
        }

        .main-container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            justify-content: center;
        }

        .value-block {
            display: flex;
            flex-direction: column;
            transition: 0.3s;
            height: fit-content;
        }

        .value-block input {
            background: #161616;
            border: 1px solid #333;
            border-bottom: none;
            border-radius: 4px 4px 0 0;
            padding: 12px;
            color: #00fff2;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            outline: none;
            cursor: default;
        }

        .value-block textarea {
            background: #111;
            border: 1px solid #333;
            border-radius: 0 0 4px 4px;
            padding: 12px;
            color: #bbb;
            font-size: 13px;
            line-height: 1.5;
            outline: none;
            resize: none;
            height: 140px;
            cursor: default;
            font-family: 'Consolas', monospace;
        }

        .hidden {
            display: none !important;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <h1 class="rgb-title">Values</h1>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="BUSCAR CATEGORIA OU ITEM...">
    </div>

    <div class="main-container" id="blocks-container"></div>

    <script>
        const data = [
            { cat: "MISC", items: "Upper Seal ~5\nAbyss Sigil ~3\nFrost Relic ~2\nTempest Relic ~0.5\nCalamity Seal ~2\nChrysalis Sigil ~2\nDark Grail ~1\nGrail ~0.3\nBroken Sword ~1\nTransmutation Shard ~20\nAdamantite ~1\nSlime Shard ~0.25\nEnergy Shard ~0.3" },
            { cat: "KEYS", items: "Tower ~3\nSlime ~2\nBoss Rush ~1\nDungeon ~1\nBoss ~0.05" },
            { cat: "REROLL", items: "Haki N/A\nTrait ~0.04\nRace ~0.02\nEnergy Shard ~0.3\nPower Shard ~5.5\nPassive Shard ~0.5" },
            { cat: "CRATES", items: "Aura Crate ~295\nCosmetic Crate ~120\nSecret Chest ~80\nMythical Chest ~2\nLegendary Chest ~1\nEpic Chest ~0.5\nRare Chest N/A\nCommon Chest N/A" },
            { cat: "GAME PASS", items: "2x Drop ~300k\n2x Luck ~200k\n2x Gem ~20k\n2x Money ~5k\n2x Exp ~3k" },
            { cat: "YUJI", items: "Energy Core ~2\nFlash Impact ~2\nDivergent Pulse ~10" },
            { cat: "GOJO", items: "Limitless Key ~1\nVoid Fragment ~5\nLimitless Ring ~5\nInfinity Core ~10" },
            { cat: "SUKUNA", items: "Malevolent Key ~1\nCursed Finger ~2\nDismantle Fang ~50\nCrimson Heart ~30" },
            { cat: "SOLO HUNTER", items: "Abyss Edge ~2\nDark Ring ~54\nShadow Heart ~40" },
            { cat: "VAMPIRE KING", items: "Soul Amulet ~20\nCasull ~40\nBlood Ring ~130" },
            { cat: "AIZEN", items: "Mirage Pendant ~2\nIllusion Prism ~2\nReiatsu Core ~50\nHogyoku Fragment ~140" },
            { cat: "YAMATO", items: "Frozen Will ~10\nYamato Essence N/A\nSilent Storm ~70\nAzure Heart ~200" },
            { cat: "MADARA", items: "Power Remnant ~4\nBattle Sigil ~35\nEternal Core ~40\nPath Fragment ~210" },
            { cat: "SUKUNA V2", items: "Awakened Cursed Finger ~2\nVessel Ring ~4x\nMalevolent Soul ~5\nCursed Flesh ~80" },
            { cat: "GOJO V2", items: "Reversal Pulse ~2\nSix Eye ~5\nBlue Singularity ~5\nInfinity Essence ~80" },
            { cat: "RIMURU (SLIME)", items: "Sage Pulse ~4\nTempest Seal ~20\nSlime Remnant ~20\nSlime Core ~160" },
            { cat: "ANOS", items: "Demonic Fragment ~5\nDemonic Shard ~10\nDestruction Eye ~90\nImperial Mark ~95" },
            { cat: "TRUE AIZEN", items: "Fusion Ring ~15\nDivinity Essence ~30\nTranscendent Core ~90\nEvolution Fragment ~170" },
            { cat: "ATOMIC", items: "Magic Shards ~11\nShadow Remnant ~30\nEminence Essence ~45\nAtomic Omen ~85" },
            { cat: "QIN SHI", items: "Jade Tablet N/A\nImperial Seal N/A" },
            { cat: "ICHIGO", items: "Soul Fragment N/A\nSpiritual Core N/A\nSoul Flame ~100" },
            { cat: "KING OF HEROES", items: "Throne Remnant ~19\nAncient Shard ~19\nGolden Essence ~19\nPhantasm Core ~170" },
            { cat: "BLESSED MAIDEN", items: "Tide Remnant ~4\nGale Essence ~12\nAero Core ~60\nCelestial Mark ~70" },
            { cat: "CORRUPTED KNIGHT", items: "Morgan Remnant ~10\nAlter Essence ~20\nCorruption Core ~90\nCorrupt Crown ~170" },
            { cat: "MOON SLAYER", items: "Demon Remnant ~10\nLunar Essence ~10\nCrescent Shard ~70\nMoon Crest ~84" },
            { cat: "ICE QUEEN", items: "Battle Shard ~2\nGlacier Remnant ~3\nFrozen Brand ~50\nIce Core ~70" },
            { cat: "SHADOW (DUNGEON)", items: "Umbral Capsule ~2\nVoid Seed ~10\nShadow Essence ~10\nAtomic Core ~140" },
            { cat: "SHADOW MONARCH (DUNGEON)", items: "Monarch Core ~8\nMonarch Essence ~20\nKamish Dagger ~65\nShadow Crystal ~90" }
        ];

        const container = document.getElementById('blocks-container');
        const searchInput = document.getElementById('searchInput');

        function renderBlocks() {
            data.forEach(item => {
                const block = document.createElement('div');
                block.className = 'value-block';
                block.innerHTML = `
                    <input type="text" value="${item.cat}" readonly>
                    <textarea readonly>${item.items}</textarea>
                `;
                container.appendChild(block);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const blocks = document.querySelectorAll('.value-block');
            blocks.forEach(block => {
                const category = block.querySelector('input').value.toLowerCase();
                const content = block.querySelector('textarea').value.toLowerCase();
                if (category.includes(term) || content.includes(term)) {
                    block.classList.remove('hidden');
                } else {
                    block.classList.add('hidden');
                }
            });
        });

        renderBlocks();
    </script>
</body>
</html>
