<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Values Project - Fixed</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
        }

        /* EFEITO RGB NO TÍTULO */
        .rgb-title {
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            position: relative;
            text-shadow: 
                3px 0 0 rgba(255,0,0,0.7), 
                -3px 0 0 rgba(0,255,255,0.7);
            animation: rgb-shake 0.5s infinite;
            margin-bottom: 50px;
        }

        @keyframes rgb-shake {
            0% { text-shadow: 3px 0 0 rgba(255,0,0,0.7), -3px 0 0 rgba(0,255,255,0.7); }
            25% { text-shadow: -3px 2px 0 rgba(255,0,0,0.7), 3px -2px 0 rgba(0,255,255,0.7); }
            50% { text-shadow: 2px -3px 0 rgba(255,0,0,0.7), -2px 3px 0 rgba(0,255,255,0.7); }
            75% { text-shadow: -2px -2px 0 rgba(255,0,0,0.7), 2px 2px 0 rgba(0,255,255,0.7); }
            100% { text-shadow: 3px 0 0 rgba(255,0,0,0.7), -3px 0 0 rgba(0,255,255,0.7); }
        }

        .main-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .value-block {
            display: flex;
            flex-direction: column;
        }

        /* UNIÃO DOS CAMPOS */
        .value-block input {
            background: #1a1a1a;
            border: 1px solid #333;
            border-bottom: none; /* Remove a borda de baixo para colar no de baixo */
            border-radius: 8px 8px 0 0;
            padding: 12px 15px;
            color: #00fff2; /* Cor de destaque para categoria */
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            outline: none;
            cursor: default;
        }

        .value-block textarea {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 0 0 8px 8px;
            padding: 12px 15px;
            color: #ccc;
            font-size: 16px;
            outline: none;
            resize: none;
            height: 80px;
            cursor: default;
        }

        /* Efeito visual de que não é editável */
        input:focus, textarea:focus {
            border-color: #333;
        }
    </style>
</head>
<body>

    <h1 class="rgb-title">Values</h1>

    <div class="main-container">
        <div class="value-block">
            <input type="text" value="Categoria 01" readonly>
            <textarea readonly>Seu texto descritivo aqui...</textarea>
        </div>

        <div class="value-block">

        </div>

        <div class="value-block">

        </div>

        <div class="value-block">

        </div>

        <div class="value-block">

        <div class="value-block">

</html>
